name: Deploy to Coolify

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: 'deploy'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deployment
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            "${{ secrets.COOLIFY_WEBHOOK }}" \
            | grep -q "200" && echo "Deployment triggered" || (echo "Failed to trigger deployment" && exit 1)
